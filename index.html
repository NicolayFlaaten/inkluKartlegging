<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Faktura Analyse</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    background: #f0f2f5;
    color: #1a2a3a;
    font-size: 13px;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  #toolbar {
    background: #1e3a5f;
    padding: 8px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }
  #toolbar h1 { color: white; font-size: 13px; font-weight: 600; flex: 1; }

  #modelSelect {
    padding: 5px 8px;
    border-radius: 5px;
    border: 1px solid #4a6fa0;
    background: #162d4a;
    color: #a0c4f0;
    font-size: 11px;
    cursor: pointer;
  }
  #modelSelect option { background: #1e3a5f; color: white; }
  #modelBadge {
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 10px;
    font-weight: 700;
    white-space: nowrap;
  }
  #modelBadge.eu { background: #166534; color: #d1fae5; }
  #modelBadge.us { background: #92400e; color: #fef3c7; }

  #dropZone {
    margin: 10px 12px 6px;
    border: 2px dashed #93c5fd;
    border-radius: 10px;
    background: white;
    padding: 14px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  #dropZone:hover, #dropZone.drag-over { border-color: #2563eb; background: #eff6ff; }
  #dropZone .icon { font-size: 22px; display: block; margin-bottom: 4px; }
  #dropZone p { color: #64748b; font-size: 11px; }
  #dropZone strong { color: #2563eb; }
  #fileInput { display: none; }

  #main {
    display: flex;
    gap: 0;
    flex: 1;
    overflow: hidden;
    margin: 0 12px 12px 12px;
    border-radius: 10px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.12);
    background: white;
  }

  #pdfPane {
    flex: 1;
    background: #525659;
    display: flex;
    flex-direction: column;
    border-radius: 10px 0 0 10px;
    overflow: hidden;
    min-width: 0;
  }
  #pdfPane h3 {
    background: #3a3d40;
    color: #ddd;
    padding: 7px 12px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.05em;
    flex-shrink: 0;
  }
  #pdfViewer {
    flex: 1;
    overflow: auto;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 10px;
  }
  #pdfCanvas { max-width: 100%; box-shadow: 0 4px 20px rgba(0,0,0,0.4); }
  #pdfPlaceholder {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; height: 100%; color: #888; gap: 8px; font-size: 12px;
  }
  #pdfPlaceholder .bigIcon { font-size: 48px; opacity: 0.4; }

  #resultPane {
    width: 300px;
    flex-shrink: 0;
    background: white;
    border-left: 1px solid #e2e8f0;
    border-radius: 0 10px 10px 0;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  #resultPane h3 {
    background: #f8fafc;
    border-bottom: 1px solid #e2e8f0;
    padding: 8px 12px;
    font-size: 11px;
    font-weight: 700;
    color: #475569;
    letter-spacing: 0.06em;
    flex-shrink: 0;
  }

  #analyzeBtn {
    margin: 10px 12px 6px;
    padding: 10px;
    background: linear-gradient(135deg, #2563eb, #1d4ed8);
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  #analyzeBtn:hover:not(:disabled) {
    background: linear-gradient(135deg, #1d4ed8, #1e40af);
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(37,99,235,0.35);
  }
  #analyzeBtn:disabled { background: #94a3b8; cursor: not-allowed; transform: none; box-shadow: none; }

  /* Dokument-type badge */
  #docTypeBadge {
    margin: 0 12px 6px;
    padding: 6px 10px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 700;
    display: none;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
  }
  #docTypeBadge.faktura  { display: flex; background: #eff6ff; color: #1d4ed8; border: 1px solid #bfdbfe; }
  #docTypeBadge.kreditnota { display: flex; background: #fff7ed; color: #c2410c; border: 1px solid #fed7aa; }

  #status {
    margin: 0 12px 6px;
    padding: 6px 10px;
    border-radius: 6px;
    font-size: 11px;
    display: none;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
  }
  #status.info    { display: flex; background: #eff6ff; color: #2563eb; border: 1px solid #bfdbfe; }
  #status.success { display: flex; background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }
  #status.error   { display: flex; background: #fff1f2; color: #be123c; border: 1px solid #fecdd3; }
  #status.warning { display: flex; background: #fffbeb; color: #92400e; border: 1px solid #fde68a; }

  .spinner {
    display: inline-block; width: 12px; height: 12px;
    border: 2px solid currentColor; border-top-color: transparent;
    border-radius: 50%; animation: spin 0.7s linear infinite; flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Varselsboks for kontonummer-avvik */
  #kontoVarsel {
    margin: 0 12px 6px;
    padding: 7px 10px;
    border-radius: 6px;
    font-size: 11px;
    background: #fff7ed;
    color: #92400e;
    border: 1px solid #fed7aa;
    display: none;
    flex-shrink: 0;
  }
  #kontoVarsel.show { display: block; }

  #fields { flex: 1; overflow-y: auto; padding: 4px 12px 8px; }

  .fieldGroup { margin-bottom: 7px; }
  .fieldGroup label {
    display: block;
    font-size: 10px;
    font-weight: 700;
    color: #94a3b8;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 3px;
  }
  .fieldVal {
    background: #f8fafc;
    border: 1px solid #e2e8f0;
    border-radius: 6px;
    padding: 7px 10px;
    font-size: 12px;
    color: #1e293b;
    min-height: 32px;
    word-break: break-all;
    transition: all 0.3s;
    white-space: pre-line;
  }
  .fieldVal.filled   { background: #fefce8; border-color: #fde047; color: #1a2a3a; font-weight: 600; }
  .fieldVal.multi    { background: #f0f9ff; border-color: #7dd3fc; font-weight: 600; }
  .fieldVal.empty    { color: #cbd5e1; font-style: italic; font-weight: 400; }
  .fieldVal.alert    { background: #fff1f2; border-color: #fca5a5; font-weight: 600; }
  .fieldVal.readonly { background: #f1f5f9; border-color: #cbd5e1; color: #64748b; font-style: italic; }

  .booking-badge {
    display: inline-block;
    background: #2563eb;
    color: white;
    font-size: 9px;
    font-weight: 700;
    padding: 1px 6px;
    border-radius: 10px;
    margin-left: 6px;
    vertical-align: middle;
  }

  .confidence { font-size: 9px; color: #94a3b8; margin-top: 2px; display: none; }
  .confidence.show { display: block; }
  .conf-high { color: #16a34a; }
  .conf-med  { color: #d97706; }
  .conf-low  { color: #dc2626; }

  .divider { border: none; border-top: 1px solid #f1f5f9; margin: 6px 0; }
  .section-label {
    font-size: 9px; font-weight: 700; color: #94a3b8;
    letter-spacing: 0.1em; text-transform: uppercase;
    margin: 8px 0 4px; display: block;
  }

  /* Innfaktura-forslag */
  #innfakturaForslag {
    margin: 0 12px 6px;
    padding: 8px 10px;
    border-radius: 6px;
    background: #f0fdf4;
    border: 1px solid #86efac;
    font-size: 11px;
    color: #166534;
    display: none;
    flex-shrink: 0;
  }
  #innfakturaForslag.show { display: block; }
  #innfakturaForslag strong { display: block; margin-bottom: 3px; font-size: 12px; }

  #sendBtn {
    margin: 0 12px 10px;
    padding: 9px;
    background: #166534;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    gap: 6px;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  #sendBtn:hover { background: #15803d; }
  #sendBtn.visible { display: flex; }

  #rawSection { margin: 0 12px 8px; flex-shrink: 0; }
  #rawToggle {
    font-size: 10px; color: #94a3b8; cursor: pointer;
    text-decoration: underline; background: none; border: none; padding: 0;
  }
  #rawText {
    display: none;
    background: #1e293b; color: #7dd3fc;
    border-radius: 6px; padding: 8px;
    font-size: 10px; font-family: monospace;
    max-height: 100px; overflow-y: auto;
    margin-top: 4px; white-space: pre-wrap; word-break: break-all;
  }
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
  if (typeof pdfjsLib !== 'undefined') {
    pdfjsLib.GlobalWorkerOptions.workerSrc =
      'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  }
</script>
</head>
<body>

<div id="toolbar">
  <h1>🤖 AI Faktura Analyse <span style="font-size:10px; font-weight:400; color:#4a6fa0; margin-left:6px;">v1.7</span></h1>
  <select id="modelSelect" onchange="updateModelBadge()">
    <optgroup label="🇺🇸 USA (Anthropic direkte)">
      <option value="anthropic|claude-haiku-4-5">Claude Haiku 4.5 — rask/billig</option>
      <option value="anthropic|claude-sonnet-4-6">Claude Sonnet 4.6 — sterkere</option>
    </optgroup>
    <optgroup label="🇪🇺 EU (Mistral AI — Frankrike)">
      <option value="mistral|mistral-small-latest">Mistral Small — rask/billig</option>
      <option value="mistral|mistral-medium-latest">Mistral Medium — sterkere</option>
      <option value="mistral|mistral-large-latest">Mistral Large — best</option>
    </optgroup>
  </select>
  <span id="modelBadge" class="us">🇺🇸 USA</span>
</div>

<div id="dropZone" onclick="document.getElementById('fileInput').click()">
  <span class="icon">📂</span>
  <p><strong>Klikk for å velge faktura</strong> eller dra PDF / bilde hit</p>
  <p style="margin-top:3px; font-size:10px; color:#94a3b8;">Støtter PDF, JPG, PNG</p>
  <input id="fileInput" type="file" accept=".pdf,.jpg,.jpeg,.png">
</div>

<div id="main">

  <div id="pdfPane">
    <h3>FAKTURA FORHÅNDSVISNING</h3>
    <div id="pdfViewer">
      <div id="pdfPlaceholder">
        <span class="bigIcon">📄</span>
        <span>Last opp en faktura for å starte</span>
      </div>
      <canvas id="pdfCanvas" style="display:none;"></canvas>
    </div>
  </div>

  <div id="resultPane">
    <h3>EKSTRAHERTE FELT</h3>

    <button id="analyzeBtn" disabled onclick="analyzeInvoice()">
      <span id="btnIcon">🔍</span>
      <span id="btnText">Analyser faktura</span>
    </button>

    <div id="docTypeBadge"></div>
    <div id="status"></div>
    <div id="kontoVarsel"></div>
    <div id="innfakturaForslag"></div>
    <div id="fields"></div>

    <div id="rawSection">
      <button id="rawToggle" onclick="toggleRaw()">Vis rå JSON-svar</button>
      <pre id="rawText"></pre>
    </div>

    <button id="sendBtn" onclick="sendToFileMaker()">
      ✅ Send til FileMaker
    </button>
  </div>

</div>

<script>
// ════════════════════════════════════════════════════════════════
//  KONFIGURASJON — tilpass disse variablene ved FileMaker-integrasjon
// ════════════════════════════════════════════════════════════════

// ════════════════════════════════════════════════════════════════
//  MODELL-KONFIGURASJON
//  Legg til egne worker-URL-er for Mistral når det er klart
// ════════════════════════════════════════════════════════════════
const PROVIDERS = {
  anthropic: {
    workerUrl: 'https://green-block-aa07accessnorway.rzt4p6sh68.workers.dev',
    label: '🇺🇸 USA — Anthropic',
    badgeClass: 'us',
    badgeText: '🇺🇸 USA',
  },
  mistral: {
    // Samme Cloudflare Worker kan brukes hvis du legger til Mistral-støtte
    // Eller sett opp en egen worker for Mistral
    workerUrl: 'https://green-block-aa07accessnorway.rzt4p6sh68.workers.dev',
    label: '🇪🇺 EU — Mistral AI',
    badgeClass: 'eu',
    badgeText: '🇪🇺 EU',
  },
};

function getSelectedModel() {
  const val = document.getElementById('modelSelect')?.value || 'anthropic|claude-haiku-4-5';
  const [provider, model] = val.split('|');
  return { provider, model, config: PROVIDERS[provider] };
}

function updateModelBadge() {
  const { config } = getSelectedModel();
  const badge = document.getElementById('modelBadge');
  if (badge) {
    badge.textContent = config.badgeText;
    badge.className = 'modelBadge ' + config.badgeClass;  // note: id stays modelBadge
  }
}

const FM_CONFIG = {
  // URL til Cloudflare Worker som proxy til Anthropic
  workerUrl:   'https://green-block-aa07accessnorway.rzt4p6sh68.workers.dev',
  workerToken: '«WORKER_TOKEN»',  // FileMaker injiserer dette ved oppstart

  // Navn på FileMaker-scriptet som mottar data fra Web Vieweren
  mottaScript: 'AI_Motta_Fakturadata',

  // Navn på FileMaker-scriptet som oppretter innfaktura (valgfritt)
  opprettInnfakturaScript: 'AI_Opprett_Innfaktura',

  // Kontonummer registrert i FileMaker for denne leverandøren
  // Settes dynamisk av FileMaker ved å erstatte «KONTONR» i HTML-koden
  registrertKontonr: '«KONTONR»',

  // Bokføringssummen fra portalen (alle matchende bookinger)
  // Settes dynamisk av FileMaker ved å erstatte «PORTALSUM» i HTML-koden
  portalSum: '«PORTALSUM»',
};

// ════════════════════════════════════════════════════════════════
//  FELTDEFINISJONAR
// ════════════════════════════════════════════════════════════════
const FIELDS = [
  { key: 'firma',       label: 'Firma',         fmField: 'Firma',      multi: false },
  { key: 'fakturanr',   label: 'Fakturanr',     fmField: 'Fakturanr',  multi: false },
  { key: 'bookingnr',   label: 'Bookingnr',     fmField: 'Bookingnr',  multi: true  },
  { key: 'hotelref',    label: 'Hotel Ref',     fmField: 'HotelRef',   multi: false },
  { key: 'gjestnavn',   label: 'Gjest navn',    fmField: 'GjestNavn',  multi: false },
  { key: 'forfall',     label: 'Forfall',       fmField: 'Forfall',    multi: false },
  { key: 'kid',         label: 'KID',           fmField: 'KID',        multi: false },
  { key: 'sum',         label: 'Sum',           fmField: 'Sum',        multi: false },
  { key: 'mva',         label: 'MVA',           fmField: 'MVA',        multi: false },
  { key: 'fakturadato', label: 'Fakturadato',   fmField: 'Fakturadato',multi: false },
  { key: 'kontonr',     label: 'Kontonr på faktura', fmField: 'Bankkonto', multi: false },
  { key: 'iban',        label: 'IBAN',          fmField: 'IBAN',       multi: false },
];

let currentFileData = null;
let currentFileType = null;
let extractedData   = null;

// ════════════════════════════════════════════════════════════════
//  BYGG FELT-UI
// ════════════════════════════════════════════════════════════════
function buildFields() {
  const container = document.getElementById('fields');
  container.innerHTML = '';

  // Vis registrert kontonr som readonly referansefelt
  if (FM_CONFIG.registrertKontonr && FM_CONFIG.registrertKontonr !== '«KONTONR»') {
    const g = document.createElement('div');
    g.className = 'fieldGroup';
    g.innerHTML = `
      <label>Registrert kontonr (FM)</label>
      <div class="fieldVal readonly">${FM_CONFIG.registrertKontonr}</div>
    `;
    container.appendChild(g);
    const hr = document.createElement('hr');
    hr.className = 'divider';
    container.appendChild(hr);
  }

  FIELDS.forEach(f => {
    const g = document.createElement('div');
    g.className = 'fieldGroup';
    const labelHtml = f.multi
      ? `<label>${f.label} <span id="badge_${f.key}" class="booking-badge" style="display:none"></span></label>`
      : `<label>${f.label}</label>`;
    g.innerHTML = `
      ${labelHtml}
      <div class="fieldVal empty" id="fv_${f.key}">—</div>
      <div class="confidence" id="fc_${f.key}"></div>
    `;
    container.appendChild(g);
    if (f.key === 'sum') {
      const hr = document.createElement('hr');
      hr.className = 'divider';
      container.appendChild(hr);
    }
  });
}

function setField(key, value, confidence, isMulti) {
  const el = document.getElementById('fv_' + key);
  const cf = document.getElementById('fc_' + key);
  if (!el) return;

  if (isMulti) {
    const arr = Array.isArray(value) ? value.filter(Boolean) : (value ? [value] : []);
    const badge = document.getElementById('badge_' + key);
    if (arr.length > 0) {
      el.textContent = arr.join('\n');
      el.className = arr.length > 1 ? 'fieldVal multi' : 'fieldVal filled';
      if (badge) {
        badge.textContent = arr.length > 1 ? arr.length + ' bookinger' : '1 booking';
        badge.style.display = 'inline-block';
        badge.style.background = arr.length > 1 ? '#2563eb' : '#16a34a';
      }
    } else {
      el.textContent = '—';
      el.className = 'fieldVal empty';
      if (badge) badge.style.display = 'none';
    }
  } else {
    if (value !== null && value !== undefined && value !== '') {
      el.textContent = value;
      el.className = 'fieldVal filled';
    } else {
      el.textContent = '—';
      el.className = 'fieldVal empty';
    }
  }

  if (cf && confidence != null) {
    const cls = confidence >= 0.9 ? 'conf-high' : confidence >= 0.6 ? 'conf-med' : 'conf-low';
    cf.textContent = 'Sikkerhet: ' + Math.round(confidence * 100) + '%';
    cf.className = 'confidence show ' + cls;
  }
}

function clearFields() {
  FIELDS.forEach(f => {
    const el = document.getElementById('fv_' + f.key);
    const cf = document.getElementById('fc_' + f.key);
    const badge = document.getElementById('badge_' + f.key);
    if (el) { el.textContent = '—'; el.className = 'fieldVal empty'; }
    if (cf) cf.className = 'confidence';
    if (badge) badge.style.display = 'none';
  });
  document.getElementById('kontoVarsel').classList.remove('show');
  document.getElementById('innfakturaForslag').classList.remove('show');
  document.getElementById('docTypeBadge').className = '';
  document.getElementById('docTypeBadge').textContent = '';
}

// ════════════════════════════════════════════════════════════════
//  FILOPPLASTING
// ════════════════════════════════════════════════════════════════
function handleFile(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async (e) => {
    const base64Full = e.target.result;
    currentFileData = base64Full.split(',')[1];
    currentFileType = file.type.includes('pdf') ? 'pdf' : 'image';
    if (currentFileType === 'pdf') await renderPDF(base64Full);
    else renderImage(base64Full);
    document.getElementById('analyzeBtn').disabled = false;
    clearFields();
    document.getElementById('sendBtn').classList.remove('visible');
    setStatus('', '');
  };
  reader.readAsDataURL(file);
}

async function renderPDF(dataUrl) {
  try {
    const pdfData = atob(dataUrl.split(',')[1]);
    const uint8 = new Uint8Array(pdfData.length);
    for (let i = 0; i < pdfData.length; i++) uint8[i] = pdfData.charCodeAt(i);
    const pdf = await pdfjsLib.getDocument({ data: uint8 }).promise;
    const page = await pdf.getPage(1);
    const vp = page.getViewport({ scale: 1.4 });
    const canvas = document.getElementById('pdfCanvas');
    canvas.width = vp.width; canvas.height = vp.height;
    await page.render({ canvasContext: canvas.getContext('2d'), viewport: vp }).promise;
    canvas.style.display = 'block';
    document.getElementById('pdfPlaceholder').style.display = 'none';
  } catch(err) {
    document.getElementById('pdfPlaceholder').innerHTML =
      '<span class="bigIcon">📄</span><span>PDF lastet inn</span>';
  }
}

function renderImage(dataUrl) {
  const canvas = document.getElementById('pdfCanvas');
  const img = new Image();
  img.onload = () => {
    canvas.width = img.width; canvas.height = img.height;
    canvas.getContext('2d').drawImage(img, 0, 0);
    canvas.style.display = 'block';
    document.getElementById('pdfPlaceholder').style.display = 'none';
  };
  img.src = dataUrl;
}

const dz = document.getElementById('dropZone');
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag-over'); });
dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
dz.addEventListener('drop', e => { e.preventDefault(); dz.classList.remove('drag-over'); handleFile(e.dataTransfer.files[0]); });
document.getElementById('fileInput').addEventListener('change', e => handleFile(e.target.files[0]));

function setStatus(type, msg) {
  const el = document.getElementById('status');
  el.className = type ? 'status ' + type : '';
  el.innerHTML = msg;
}

// ════════════════════════════════════════════════════════════════
//  KONTONUMMER-SAMMENLIGNING
// ════════════════════════════════════════════════════════════════
function normaliserKonto(konto) {
  return (konto || '').replace(/[\s.\-]/g, '').toLowerCase();
}

function sjekkKontonummer(fakturakonto, iban) {
  const regKonto = FM_CONFIG.registrertKontonr;
  if (!regKonto || regKonto === '«KONTONR»') return; // ikke satt fra FileMaker

  const reg = normaliserKonto(regKonto);
  const fk  = normaliserKonto(fakturakonto);
  const ib  = normaliserKonto(iban);

  // Sjekk om registrert konto finnes i enten kontonr eller IBAN fra faktura
  const match = (fk && (fk === reg || fk.includes(reg) || reg.includes(fk))) ||
                (ib && (ib === reg || ib.includes(reg) || reg.includes(ib)));

  if (!match && (fk || ib)) {
    const varsel = document.getElementById('kontoVarsel');
    varsel.innerHTML = `⚠️ <strong>Kontonummer-avvik!</strong><br>
      Registrert: <strong>${regKonto}</strong><br>
      På faktura: <strong>${fakturakonto || '—'}</strong>${iban ? ' / ' + iban : ''}`;
    varsel.classList.add('show');

    // Marker kontonr-feltet rødt
    const el = document.getElementById('fv_kontonr');
    if (el && el.textContent !== '—') el.className = 'fieldVal alert';
    const elIban = document.getElementById('fv_iban');
    if (elIban && elIban.textContent !== '—') elIban.className = 'fieldVal alert';
  }
}

// ════════════════════════════════════════════════════════════════
//  INNFAKTURA-FORSLAG
// ════════════════════════════════════════════════════════════════
function sjekkInnfakturaForslag(fakturaSum) {
  const portalSum = FM_CONFIG.portalSum;
  if (!portalSum || portalSum === '«PORTALSUM»' || !fakturaSum) return;

  const fs = parseFloat(String(fakturaSum).replace(',', '.'));
  const ps = parseFloat(String(portalSum).replace(',', '.'));

  if (!isNaN(fs) && !isNaN(ps) && Math.abs(fs - ps) < 0.01) {
    const forslag = document.getElementById('innfakturaForslag');
    forslag.innerHTML = `<strong>✅ Sum stemmer med portal (${ps})</strong>
      Bookingsum og fakturassum er like — du kan opprette innfaktura.`;
    forslag.classList.add('show');
  }
}

// ════════════════════════════════════════════════════════════════
//  ANALYSE
// ════════════════════════════════════════════════════════════════
async function analyzeInvoice() {
  if (!currentFileData) { setStatus('error', '⚠️ Last opp en faktura først'); return; }

  const btn = document.getElementById('analyzeBtn');
  btn.disabled = true;
  document.getElementById('btnIcon').innerHTML = '<span class="spinner"></span>';
  document.getElementById('btnText').textContent = 'Analyserer…';
  setStatus('info', '<span class="spinner"></span> Claude leser dokumentet…');
  clearFields();
  document.getElementById('sendBtn').classList.remove('visible');

  const prompt = `Du er en ekspert på å ekstrahere data fra fakturaer og kreditnotaer, spesielt fra hotell og reiseliv.

Les dokumentet og returner KUN gyldig JSON. Ingen forklaring, ingen markdown.

DOKUMENTTYPE:
- Sjekk om dette er en "faktura" eller "kreditnota" (credit note/kreditering)
- En kreditnota har ofte negativt beløp, eller tekst som "Kreditnota", "Credit Note", "Kreditering"

BOOKINGNR — VIKTIG:
- Vi bruker interne bookingnumre som typisk er 6-sifrede tall, f.eks: 163536, 164300
- Returner ALLTID bookingnr som array, selv om det bare er ett
- Hvis du IKKE finner slike numre, returner tom array []
- Se etter felt merket: Booking, Reservation, Bookingnr, Bnr, Stay-ID, Folio

HOTELREF:
- Hotellets egne reservasjonsnumre/referanser som IKKE er våre bookingnumre
- F.eks: Res #, Reservation Number, Room, folio-nummer
- Returner som streng, kommaseparert hvis flere

FAKTURANR:
- Hvis det er flere fakturanumre på samme dokument, skill med komma

JSON-struktur (null for felt som ikke finnes):
{
  "dokumenttype":  "faktura" eller "kreditnota",
  "firma":         "leverandørens navn",
  "fakturanr":     "fakturanummer(e), kommaseparert",
  "bookingnr":     ["163536", "164300"],
  "hotelref":      "hotellets reservasjonsnummer(e)",
  "gjestnavn":     "gjestens navn(n), kommaseparert",
  "forfall":       "YYYY-MM-DD",
  "kid":           "KID eller betalingsreferanse",
  "sum":           "totalbeløp som tall uten valutasymbol (negativt for kreditnota)",
  "mva":           "MVA-beløp som tall",
  "fakturadato":   "YYYY-MM-DD",
  "kontonr":       "bankkontonummer slik det står på fakturaen",
  "iban":          "IBAN-nummer",
  "konfidensgrad": {
    "firma": 0.95, "fakturanr": 0.99, "bookingnr": 0.90, "hotelref": 0.85,
    "gjestnavn": 0.85, "forfall": 0.98, "kid": 0.70, "sum": 0.99,
    "mva": 0.95, "fakturadato": 0.98, "kontonr": 0.90, "iban": 0.90
  }
}`;

  const mediaType = currentFileType === 'pdf' ? 'application/pdf' : 'image/jpeg';
  const contentType = currentFileType === 'pdf' ? 'document' : 'image';

  try {
    const { provider, model, config: providerConfig } = getSelectedModel();
    const resp = await fetch(providerConfig.workerUrl, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-Worker-Token': FM_CONFIG.workerToken,
        'X-Provider': provider
      },
      body: JSON.stringify({
        model: model,
        max_tokens: 1024,
        messages: [{
          role: 'user',
          content: [
            { type: contentType, source: { type: 'base64', media_type: mediaType, data: currentFileData } },
            { type: 'text', text: prompt }
          ]
        }]
      })
    });

    if (!resp.ok) {
      const err = await resp.json().catch(() => ({}));
      throw new Error(err?.error?.message || 'HTTP ' + resp.status);
    }

    const data = await resp.json();
    const raw = data.content?.[0]?.text || '';
    document.getElementById('rawText').textContent = raw;

    const clean = raw.replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(clean);
    extractedData = parsed;

    const conf = parsed.konfidensgrad || {};
    FIELDS.forEach(f => setField(f.key, parsed[f.key], conf[f.key], f.multi));

    // Dokumenttype-badge
    const badge = document.getElementById('docTypeBadge');
    if (parsed.dokumenttype === 'kreditnota') {
      badge.textContent = '⚠️ KREDITNOTA';
      badge.className = 'kreditnota';
    } else {
      badge.textContent = '📄 Faktura';
      badge.className = 'faktura';
    }

    // Kontonummer-sjekk
    sjekkKontonummer(parsed.kontonr, parsed.iban);

    // Innfaktura-forslag
    sjekkInnfakturaForslag(parsed.sum);

    // Statusmelding
    const bnr = parsed.bookingnr;
    const antall = Array.isArray(bnr) ? bnr.length : 0;
    const bookingTekst = antall > 1
      ? ` — <strong>${antall} bookingnumre funnet</strong>`
      : antall === 0 ? ' — <strong>ingen bookingnr funnet</strong>' : '';
    setStatus('success', '✅ Analyse fullført' + bookingTekst);
    document.getElementById('sendBtn').classList.add('visible');

  } catch(err) {
    setStatus('error', '❌ Feil: ' + err.message);
    console.error(err);
  } finally {
    btn.disabled = false;
    document.getElementById('btnIcon').textContent = '🔍';
    document.getElementById('btnText').textContent = 'Analyser på nytt';
  }
}

// ════════════════════════════════════════════════════════════════
//  SEND TIL FILEMAKER
// ════════════════════════════════════════════════════════════════
function sendToFileMaker() {
  if (!extractedData) return;

  const bookingnrArr = Array.isArray(extractedData.bookingnr)
    ? extractedData.bookingnr
    : (extractedData.bookingnr ? [extractedData.bookingnr] : []);

  const payload = {
    Dokumenttype: extractedData.dokumenttype  ?? 'faktura',
    Firma:        extractedData.firma         ?? '',
    Fakturanr:    extractedData.fakturanr     ?? '',
    Bookingnr:    bookingnrArr.join('\n'),      // ¶-separert i FileMaker
    HotelRef:     extractedData.hotelref      ?? '',
    GjestNavn:    extractedData.gjestnavn     ?? '',
    Forfall:      extractedData.forfall       ?? '',
    KID:          extractedData.kid           ?? '',
    Sum:          extractedData.sum           ?? '',
    MVA:          extractedData.mva           ?? '',
    Fakturadato:  extractedData.fakturadato   ?? '',
    Bankkonto:    extractedData.kontonr       ?? '',
    IBAN:         extractedData.iban          ?? '',
  };

  const jsonPayload = JSON.stringify(payload);

  try {
    if (typeof FileMaker !== 'undefined') {
      FileMaker.PerformScript(FM_CONFIG.mottaScript, jsonPayload);
      setStatus('success', '✅ Data sendt til FileMaker!');
    } else {
      console.log('FileMaker payload:', jsonPayload);
      alert('FileMaker payload (dev-modus):\n\n' + JSON.stringify(payload, null, 2));
    }
  } catch(e) {
    console.error(e);
  }
}

function toggleRaw() {
  const el = document.getElementById('rawText');
  el.style.display = el.style.display === 'block' ? 'none' : 'block';
}

buildFields();
